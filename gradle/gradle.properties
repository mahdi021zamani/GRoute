# Project-wide Gradle settings.

# --- Memory: give the daemon more headroom and enable G1GC for large builds ---
org.gradle.jvmargs=-Xmx4096m -XX:+UseParallelGC -Dfile.encoding=UTF-8

# --- Build speed ---
# Run independent modules/tasks in parallel.
org.gradle.parallel=true
# Reuse outputs from previous builds (huge for incremental builds).
org.gradle.caching=true
# Only configure the projects actually needed for the requested tasks.
org.gradle.configureondemand=true
# Skip the configuration phase entirely when nothing build-affecting changed.
org.gradle.configuration-cache=true

# --- Kotlin ---
kotlin.code.style=official
# Incremental Kotlin compilation (usually default-on, made explicit).
kotlin.incremental=true

# --- Android / R8 ---
# Only package the resources your code + configuration actually reference.
android.nonTransitiveRClass=true
# Full R8 mode: more aggressive optimization than compat mode.
android.enableR8.fullMode=true
# Don't build per-density/ABI unless you configure splits; keeps universal APK simple.

systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=10626
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=10626
