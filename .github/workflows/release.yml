name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: |
          echo "DONATION_CARD_NUMBER=${{ secrets.DONATION_CARD_NUMBER }}" >> local.properties
          echo "DONATION_CARD_HOLDER=${{ secrets.DONATION_CARD_HOLDER }}" >> local.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GRoute-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Clean up secrets from runner
        if: always()
        run: rm -f app/release.jks local.properties
